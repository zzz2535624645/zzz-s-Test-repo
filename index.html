<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>合成大西瓜 🍉</title>
    <style>
        :root {
            --bg: #1a1a2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #game-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        canvas {
            border-radius: 20px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 4px rgba(255, 255, 255, 0.08),
                inset 0 0 0 2px rgba(255, 255, 255, 0.03);
            cursor: pointer;
            max-height: 92vh;
            max-width: 95vw;
            display: block;
        }

        #hint-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            letter-spacing: 2px;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        @media (max-width: 440px) {
            canvas {
                border-radius: 14px;
                box-shadow: 0 12px 36px rgba(0, 0, 0, 0.5), 0 0 0 3px rgba(255, 255, 255, 0.06);
            }
            #hint-text {
                font-size: 12px;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>
        <div id="hint-text">移动鼠标定位 · 点击释放水果</div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const hintText = document.getElementById('hint-text');

            // --- Canvas 尺寸 ---
            const W = 420;
            const H = 750;
            canvas.width = W;
            canvas.height = H;

            // --- 容器边界 ---
            const CONTAINER_LEFT = 14;
            const CONTAINER_RIGHT = W - 14;
            const CONTAINER_TOP = 68;
            const CONTAINER_BOTTOM = H - 16;
            const CONTAINER_WIDTH = CONTAINER_RIGHT - CONTAINER_LEFT;
            const DANGER_LINE_Y = 155;

            // --- 水果等级配置 ---
            const fruitTypes = [
                { name: '樱桃', radius: 15, color: '#e8313f', colorDark: '#b71c28', colorLight: '#ff5c6c',
                    score: 10 },
                { name: '草莓', radius: 19, color: '#f0445a', colorDark: '#c62838', colorLight: '#ff7b8a',
                    score: 20 },
                { name: '葡萄', radius: 23, color: '#9c4dcc', colorDark: '#6a1b9a', colorLight: '#c48bff',
                    score: 40 },
                { name: '橘子', radius: 28, color: '#ff8c3a', colorDark: '#d45d00', colorLight: '#ffb87a',
                score: 80 },
                { name: '苹果', radius: 33, color: '#f44336', colorDark: '#b71c1c', colorLight: '#ff7961',
                    score: 160 },
                { name: '梨', radius: 38, color: '#bcd452', colorDark: '#7d9a2e', colorLight: '#ddf08b',
                score: 320 },
                { name: '桃子', radius: 43, color: '#ffb8a8', colorDark: '#e8877a', colorLight: '#ffe0d8',
                    score: 640 },
                { name: '菠萝', radius: 49, color: '#f9c74f', colorDark: '#c4972a', colorLight: '#ffe48a',
                    score: 1280 },
                { name: '哈密瓜', radius: 55, color: '#7ecb76', colorDark: '#4a8c3f', colorLight: '#b0f0a0',
                    score: 2560 },
                { name: '大西瓜', radius: 62, color: '#2d7d46', colorDark: '#1a4d28', colorLight: '#5ab870',
                    score: 5000 },
            ];

            // --- 游戏状态 ---
            let fruits = [];
            let particles = [];
            let score = 0;
            let bestScore = parseInt(localStorage.getItem('watermelonBestScore') || '0');
            let gameOver = false;
            let gameStarted = false;
            let currentFruitLevel = null;
            let nextFruitLevel = null;
            let mouseX = CONTAINER_LEFT + CONTAINER_WIDTH / 2;
            let mouseInCanvas = false;
            let fruitIdCounter = 0;
            let shakeAmount = 0;
            let shakeDecay = 0.85;
            let comboCount = 0;
            let comboTimer = 0;
            let lastMergeTime = 0;
            let lastReleaseTime = 0; // 新增：上次释放时间戳

            // --- 物理参数 ---
            const GRAVITY = 980;
            const SUBSTEPS = 5;
            const DAMPING = 0.995;
            const WALL_BOUNCE = 0.25;
            const GROUND_BOUNCE = 0.2;
            const FRICTION = 0.92;
            const MIN_SPEED = 1.5;

            // --- 初始化 ---
            function randomFruitLevel() {
                const weights = [30, 25, 20, 15, 10, 0, 0, 0, 0, 0];
                const total = weights.reduce((a, b) => a + b, 0);
                let r = Math.random() * total;
                for (let i = 0; i < weights.length; i++) {
                    r -= weights[i];
                    if (r <= 0) return i;
                }
                return 0;
            }

            function spawnInitialFruits() {
                const initialFruits = [
                    { level: 0, x: CONTAINER_LEFT + 80, y: CONTAINER_BOTTOM - 20 },
                    { level: 0, x: CONTAINER_LEFT + 160, y: CONTAINER_BOTTOM - 20 },
                    { level: 1, x: CONTAINER_LEFT + 240, y: CONTAINER_BOTTOM - 22 },
                    { level: 0, x: CONTAINER_LEFT + 310, y: CONTAINER_BOTTOM - 20 },
                ];
                for (const f of initialFruits) {
                    const ft = fruitTypes[f.level];
                    fruits.push({
                        id: fruitIdCounter++,
                        x: f.x,
                        y: f.y - ft.radius,
                        vx: (Math.random() - 0.5) * 30,
                        vy: -Math.random() * 60,
                        level: f.level,
                        radius: ft.radius,
                        createdAt: performance.now(),
                    });
                }
            }

            function resetGame() {
                fruits = [];
                particles = [];
                score = 0;
                gameOver = false;
                gameStarted = false;
                shakeAmount = 0;
                comboCount = 0;
                comboTimer = 0;
                lastMergeTime = 0;
                lastReleaseTime = 0; // 重置冷却时间
                fruitIdCounter = 0;
                currentFruitLevel = randomFruitLevel();
                nextFruitLevel = randomFruitLevel();
                spawnInitialFruits();
                hintText.style.opacity = '1';
            }

            // --- 粒子系统 ---
            function spawnParticles(x, y, color, count) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 80 + Math.random() * 280;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - Math.random() * 150,
                        life: 0.5 + Math.random() * 0.7,
                        maxLife: 0.5 + Math.random() * 0.7,
                        color: color,
                        size: 2 + Math.random() * 5,
                    });
                }
            }

            function updateParticles(dt) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += GRAVITY * 0.6 * dt;
                    p.life -= dt;
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }
            }

            function drawParticles(ctx) {
                for (const p of particles) {
                    const alpha = Math.max(0, p.life / p.maxLife);
                    const size = p.size * alpha;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = size * 2;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // --- 合并逻辑 ---
            function mergeFruits(a, b) {
                if (a.level >= fruitTypes.length - 1 || b.level >= fruitTypes.length - 1) return null;
                if (a.level !== b.level) return null;

                const newLevel = a.level + 1;
                const ft = fruitTypes[newLevel];
                const totalMass = a.radius * a.radius + b.radius * b.radius;
                const ax = a.x * (a.radius * a.radius) / totalMass + b.x * (b.radius * b.radius) / totalMass;
                const ay = a.y * (a.radius * a.radius) / totalMass + b.y * (b.radius * b.radius) / totalMass;
                const avgVx = (a.vx + b.vx) * 0.5;
                const avgVy = (a.vy + b.vy) * 0.5;

                const clampedX = Math.max(CONTAINER_LEFT + ft.radius, Math.min(CONTAINER_RIGHT - ft.radius, ax));
                const clampedY = Math.max(ft.radius, Math.min(CONTAINER_BOTTOM - ft.radius, ay));

                const newFruit = {
                    id: fruitIdCounter++,
                    x: clampedX,
                    y: clampedY,
                    vx: avgVx,
                    vy: avgVy - 40,
                    level: newLevel,
                    radius: ft.radius,
                    createdAt: performance.now(),
                };

                return newFruit;
            }

            // --- 物理更新 ---
            function physicsStep(dt) {
                const subDt = dt / SUBSTEPS;

                for (let s = 0; s < SUBSTEPS; s++) {
                    for (const fruit of fruits) {
                        fruit.vy += GRAVITY * subDt;
                    }

                    for (const fruit of fruits) {
                        fruit.x += fruit.vx * subDt;
                        fruit.y += fruit.vy * subDt;
                    }

                    for (const fruit of fruits) {
                        if (fruit.x - fruit.radius < CONTAINER_LEFT) {
                            fruit.x = CONTAINER_LEFT + fruit.radius;
                            fruit.vx = Math.abs(fruit.vx) * WALL_BOUNCE;
                        }
                        if (fruit.x + fruit.radius > CONTAINER_RIGHT) {
                            fruit.x = CONTAINER_RIGHT - fruit.radius;
                            fruit.vx = -Math.abs(fruit.vx) * WALL_BOUNCE;
                        }
                        if (fruit.y + fruit.radius > CONTAINER_BOTTOM) {
                            fruit.y = CONTAINER_BOTTOM - fruit.radius;
                            fruit.vy = -Math.abs(fruit.vy) * GROUND_BOUNCE;
                            fruit.vx *= FRICTION;
                            if (Math.abs(fruit.vy) < MIN_SPEED * 3) fruit.vy = 0;
                        }
                        if (fruit.y - fruit.radius < -200) {
                            fruit.y = -200 + fruit.radius;
                            fruit.vy = Math.abs(fruit.vy) * 0.3;
                        }
                    }

                    const mergedThisSubstep = new Set();
                    const fruitsToAdd = [];
                    const fruitsToRemove = new Set();

                    for (let i = 0; i < fruits.length; i++) {
                        if (fruitsToRemove.has(fruits[i].id)) continue;
                        for (let j = i + 1; j < fruits.length; j++) {
                            if (fruitsToRemove.has(fruits[j].id)) continue;
                            const a = fruits[i];
                            const b = fruits[j];
                            if (mergedThisSubstep.has(a.id) || mergedThisSubstep.has(b.id)) continue;
                            if (fruitsToRemove.has(a.id) || fruitsToRemove.has(b.id)) continue;

                            const dx = b.x - a.x;
                            const dy = b.y - a.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            const minDist = a.radius + b.radius;

                            if (dist < minDist && dist > 0.001) {
                                if (a.level === b.level && a.level < fruitTypes.length - 1) {
                                    const merged = mergeFruits(a, b);
                                    if (merged) {
                                        fruitsToAdd.push(merged);
                                        fruitsToRemove.add(a.id);
                                        fruitsToRemove.add(b.id);
                                        mergedThisSubstep.add(a.id);
                                        mergedThisSubstep.add(b.id);
                                        mergedThisSubstep.add(merged.id);

                                        const pts = fruitTypes[a.level].score;
                                        score += pts;
                                        if (score > bestScore) {
                                            bestScore = score;
                                            localStorage.setItem('watermelonBestScore', bestScore);
                                        }

                                        const mx = (a.x + b.x) / 2;
                                        const my = (a.y + b.y) / 2;
                                        spawnParticles(mx, my, fruitTypes[merged.level].colorLight, 18 + merged.level *
                                            4);

                                        shakeAmount = Math.max(shakeAmount, 3 + merged.level * 1.2);

                                        const now = performance.now();
                                        if (now - lastMergeTime < 800) {
                                            comboCount++;
                                            comboTimer = 1.5;
                                        } else {
                                            comboCount = 1;
                                            comboTimer = 1.2;
                                        }
                                        lastMergeTime = now;

                                        continue;
                                    }
                                }

                                const nx = dx / dist;
                                const ny = dy / dist;
                                const overlap = minDist - dist;
                                const totalRadius = a.radius + b.radius;
                                const aShare = b.radius / totalRadius;
                                const bShare = a.radius / totalRadius;

                                if (!mergedThisSubstep.has(a.id) && !fruitsToRemove.has(a.id)) {
                                    a.x -= nx * overlap * aShare;
                                    a.y -= ny * overlap * aShare;
                                }
                                if (!mergedThisSubstep.has(b.id) && !fruitsToRemove.has(b.id)) {
                                    b.x += nx * overlap * bShare;
                                    b.y += ny * overlap * bShare;
                                }

                                const relVx = a.vx - b.vx;
                                const relVy = a.vy - b.vy;
                                const relVelAlongNormal = relVx * nx + relVy * ny;

                                if (relVelAlongNormal > 0) {
                                    const restitution = 0.35;
                                    const impulse = relVelAlongNormal * (1 + restitution) * 0.5;
                                    if (!mergedThisSubstep.has(a.id) && !fruitsToRemove.has(a.id)) {
                                        a.vx -= impulse * nx;
                                        a.vy -= impulse * ny;
                                    }
                                    if (!mergedThisSubstep.has(b.id) && !fruitsToRemove.has(b.id)) {
                                        b.vx += impulse * nx;
                                        b.vy += impulse * ny;
                                    }
                                }
                            }
                        }
                    }

                    if (fruitsToRemove.size > 0) {
                        fruits = fruits.filter(f => !fruitsToRemove.has(f.id));
                    }
                    for (const nf of fruitsToAdd) {
                        fruits.push(nf);
                    }

                    for (const fruit of fruits) {
                        fruit.vx *= DAMPING;
                        fruit.vy *= DAMPING;
                        if (Math.abs(fruit.vx) < MIN_SPEED * 0.3) fruit.vx = 0;
                        if (Math.abs(fruit.vy) < MIN_SPEED * 0.3) fruit.vy = 0;
                    }
                }
            }

            function checkGameOver() {
                if (!gameStarted) return;
                const now = performance.now();
                for (const fruit of fruits) {
                    const age = now - fruit.createdAt;
                    if (age > 100 && fruit.y - fruit.radius < DANGER_LINE_Y && Math.abs(fruit.vy) < 8 && Math.abs(fruit
                            .vx) < 8) {
                        gameOver = true;
                        hintText.style.opacity = '0';
                        spawnParticles(fruit.x, fruit.y, '#ffffff', 30);
                        shakeAmount = 10;
                        if (score > bestScore) {
                            bestScore = score;
                            localStorage.setItem('watermelonBestScore', bestScore);
                        }
                        return;
                    }
                }
            }

            // --- 释放水果 (加入0.5秒冷却) ---
            function releaseFruit() {
                if (gameOver) {
                    resetGame();
                    return;
                }
                if (currentFruitLevel === null) return;

                const now = performance.now();
                // 冷却检查：距离上次释放不足0.5秒则忽略
                if (now - lastReleaseTime < 500) return;

                const ft = fruitTypes[currentFruitLevel];
                const releaseX = Math.max(CONTAINER_LEFT + ft.radius, Math.min(CONTAINER_RIGHT - ft.radius, mouseX));
                const releaseY = CONTAINER_TOP + ft.radius + 4;

                fruits.push({
                    id: fruitIdCounter++,
                    x: releaseX,
                    y: releaseY,
                    vx: 0,
                    vy: 20,
                    level: currentFruitLevel,
                    radius: ft.radius,
                    createdAt: performance.now(),
                });

                lastReleaseTime = now; // 更新冷却时间戳
                gameStarted = true;
                hintText.style.opacity = '0.3';
                currentFruitLevel = nextFruitLevel;
                nextFruitLevel = randomFruitLevel();
            }

            // --- 绘制函数 ---
            function drawFruit(ctx, x, y, radius, level, alpha = 1) {
                if (alpha <= 0) return;
                const ft = fruitTypes[level];

                ctx.save();
                ctx.globalAlpha = alpha;

                const grad = ctx.createRadialGradient(x - radius * 0.3, y - radius * 0.35, radius * 0.08, x, y, radius);
                grad.addColorStop(0, ft.colorLight);
                grad.addColorStop(0.55, ft.color);
                grad.addColorStop(1, ft.colorDark);

                ctx.fillStyle = grad;
                ctx.shadowColor = 'rgba(0,0,0,0.35)';
                ctx.shadowBlur = radius * 0.3;
                ctx.shadowOffsetX = radius * 0.08;
                ctx.shadowOffsetY = radius * 0.12;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                const hlGrad = ctx.createRadialGradient(x - radius * 0.28, y - radius * 0.32, radius * 0.02, x - radius *
                    0.1, y - radius * 0.15, radius * 0.55);
                hlGrad.addColorStop(0, 'rgba(255,255,255,0.7)');
                hlGrad.addColorStop(0.4, 'rgba(255,255,255,0.2)');
                hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = hlGrad;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();

                if (level === 9) {
                    ctx.strokeStyle = 'rgba(20,55,30,0.5)';
                    ctx.lineWidth = radius * 0.1;
                    for (let stripe = -1; stripe <= 1; stripe += 2) {
                        ctx.beginPath();
                        ctx.ellipse(x + stripe * radius * 0.25, y, radius * 0.7, radius * 0.95, stripe * 0.25, 0, Math.PI *
                            2);
                        ctx.stroke();
                    }
                    ctx.lineWidth = radius * 0.06;
                    ctx.strokeStyle = 'rgba(20,55,30,0.35)';
                    ctx.beginPath();
                    ctx.ellipse(x, y + radius * 0.15, radius * 0.55, radius * 0.75, 0, 0, Math.PI * 2);
                    ctx.stroke();
                }

                if (level === 8) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.lineWidth = radius * 0.06;
                    for (let i = -2; i <= 2; i++) {
                        ctx.beginPath();
                        ctx.arc(x + i * radius * 0.28, y, radius * 0.6, -0.6, 0.6);
                        ctx.stroke();
                    }
                }

                ctx.restore();
            }

            function drawContainer(ctx) {
                const bgGrad = ctx.createLinearGradient(CONTAINER_LEFT, 0, CONTAINER_RIGHT, 0);
                bgGrad.addColorStop(0, '#3d3528');
                bgGrad.addColorStop(0.5, '#5a4e3a');
                bgGrad.addColorStop(1, '#3d3528');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(CONTAINER_LEFT, CONTAINER_TOP, CONTAINER_WIDTH, CONTAINER_BOTTOM - CONTAINER_TOP);

                ctx.fillStyle = 'rgba(0,0,0,0.08)';
                const stripeSpacing = 40;
                for (let sy = CONTAINER_TOP; sy < CONTAINER_BOTTOM; sy += stripeSpacing) {
                    ctx.fillRect(CONTAINER_LEFT, sy, CONTAINER_WIDTH, 1);
                }

                const wallGrad = ctx.createLinearGradient(CONTAINER_LEFT - 6, 0, CONTAINER_LEFT + 2, 0);
                wallGrad.addColorStop(0, '#6b5d45');
                wallGrad.addColorStop(0.5, '#9b8a6b');
                wallGrad.addColorStop(1, '#5a4a35');
                ctx.fillStyle = wallGrad;
                ctx.fillRect(CONTAINER_LEFT - 6, CONTAINER_TOP - 4, 10, CONTAINER_BOTTOM - CONTAINER_TOP + 8);
                ctx.fillRect(CONTAINER_RIGHT - 4, CONTAINER_TOP - 4, 10, CONTAINER_BOTTOM - CONTAINER_TOP + 8);

                const bottomGrad = ctx.createLinearGradient(0, CONTAINER_BOTTOM - 4, 0, CONTAINER_BOTTOM + 8);
                bottomGrad.addColorStop(0, '#9b8a6b');
                bottomGrad.addColorStop(0.5, '#6b5d45');
                bottomGrad.addColorStop(1, '#3d3020');
                ctx.fillStyle = bottomGrad;
                ctx.fillRect(CONTAINER_LEFT - 6, CONTAINER_BOTTOM - 4, CONTAINER_WIDTH + 16, 14);

                ctx.strokeStyle = 'rgba(255,255,255,0.12)';
                ctx.lineWidth = 2;
                ctx.strokeRect(CONTAINER_LEFT - 1, CONTAINER_TOP - 1, CONTAINER_WIDTH + 2, CONTAINER_BOTTOM - CONTAINER_TOP +
                    2);

                ctx.setLineDash([8, 10]);
                ctx.strokeStyle = 'rgba(255,80,80,0.55)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(CONTAINER_LEFT + 8, DANGER_LINE_Y);
                ctx.lineTo(CONTAINER_RIGHT - 8, DANGER_LINE_Y);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.fillStyle = 'rgba(255,80,80,0.65)';
                ctx.font = 'bold 11px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText('⚠ 危险线', CONTAINER_RIGHT - 14, DANGER_LINE_Y - 6);
                ctx.textAlign = 'start';
            }

            function drawUI(ctx) {
                const topBgGrad = ctx.createLinearGradient(0, 0, 0, CONTAINER_TOP);
                topBgGrad.addColorStop(0, '#1e1e35');
                topBgGrad.addColorStop(1, '#2a2540');
                ctx.fillStyle = topBgGrad;
                ctx.fillRect(0, 0, W, CONTAINER_TOP);

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 22px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`🍉 得分: ${score}`, 20, 32);

                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '12px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.fillText(`最高: ${bestScore}`, 22, 50);

                if (comboTimer > 0) {
                    const comboAlpha = Math.min(1, comboTimer);
                    ctx.fillStyle = `rgba(255,215,0,${comboAlpha})`;
                    ctx.font = 'bold 16px "PingFang SC","Microsoft YaHei",sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(`🔥 ${comboCount}连击!`, W / 2, 30);
                }

                ctx.fillStyle = 'rgba(255,255,255,0.55)';
                ctx.font = '13px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText('下一个:', W - 80, 28);
                if (nextFruitLevel !== null) {
                    const ft = fruitTypes[nextFruitLevel];
                    const previewR = Math.min(ft.radius, 26);
                    drawFruit(ctx, W - 38, 44, previewR, nextFruitLevel, 0.9);
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
                    ctx.textAlign = 'right';
                    ctx.fillText(ft.name, W - 16, 56);
                }
                ctx.textAlign = 'start';
            }

            function drawGameOverOverlay(ctx) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 38px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束', W / 2, H / 2 - 50);

                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 26px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.fillText(`最终得分: ${score}`, W / 2, H / 2 + 5);

                if (score >= bestScore && score > 0) {
                    ctx.fillStyle = '#ff6b6b';
                    ctx.font = 'bold 18px "PingFang SC","Microsoft YaHei",sans-serif';
                    ctx.fillText('🏆 新最高分!', W / 2, H / 2 + 38);
                }

                const btnX = W / 2 - 90;
                const btnY = H / 2 + 60;
                const btnW = 180;
                const btnH = 50;
                const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
                btnGrad.addColorStop(0, '#ff6b6b');
                btnGrad.addColorStop(1, '#e55a5a');
                ctx.fillStyle = btnGrad;
                ctx.shadowColor = 'rgba(255,100,100,0.5)';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.roundRect(btnX, btnY, btnW, btnH, 25);
                ctx.fill();
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 20px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.fillText('🔄 重新开始', W / 2, btnY + 34);
                ctx.textAlign = 'start';
            }

            // --- 主循环 ---
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                lastTime = timestamp;

                if (dt > 0.1) dt = 0.1;
                if (dt <= 0) dt = 0.016;

                if (comboTimer > 0) {
                    comboTimer -= dt;
                    if (comboTimer < 0) comboTimer = 0;
                }

                if (shakeAmount > 0.01) {
                    shakeAmount *= shakeDecay;
                } else {
                    shakeAmount = 0;
                }

                if (!gameOver) {
                    physicsStep(dt);
                    checkGameOver();
                }
                updateParticles(dt);

                const shakeX = shakeAmount > 0.01 ? (Math.random() - 0.5) * shakeAmount * 2 : 0;
                const shakeY = shakeAmount > 0.01 ? (Math.random() - 0.5) * shakeAmount * 2 : 0;

                ctx.clearRect(0, 0, W, H);

                ctx.save();
                ctx.translate(shakeX, shakeY);

                const outerBg = ctx.createLinearGradient(0, 0, 0, H);
                outerBg.addColorStop(0, '#1a1a35');
                outerBg.addColorStop(0.5, '#222240');
                outerBg.addColorStop(1, '#191928');
                ctx.fillStyle = outerBg;
                ctx.fillRect(0, 0, W, H);

                ctx.fillStyle = 'rgba(255,255,255,0.03)';
                const seed = 42;
                for (let i = 0; i < 30; i++) {
                    const px = ((i * 137 + seed) % W);
                    const py = ((i * 251 + seed * 3) % H);
                    ctx.beginPath();
                    ctx.arc(px, py, 1.5 + (i % 3), 0, Math.PI * 2);
                    ctx.fill();
                }

                drawContainer(ctx);

                for (const fruit of fruits) {
                    drawFruit(ctx, fruit.x, fruit.y, fruit.radius, fruit.level, 1);
                }

                if (!gameOver && currentFruitLevel !== null && mouseInCanvas) {
                    const ft = fruitTypes[currentFruitLevel];
                    const previewX = Math.max(CONTAINER_LEFT + ft.radius, Math.min(CONTAINER_RIGHT - ft.radius, mouseX));
                    const previewY = CONTAINER_TOP + ft.radius + 4;
                    ctx.setLineDash([4, 6]);
                    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(previewX, previewY + ft.radius);
                    ctx.lineTo(previewX, previewY + ft.radius + 50);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    drawFruit(ctx, previewX, previewY, ft.radius, currentFruitLevel, 0.55);
                }

                drawParticles(ctx);

                ctx.restore();

                drawUI(ctx);

                if (gameOver) {
                    drawGameOverOverlay(ctx);
                }

                requestAnimationFrame(gameLoop);
            }

            // --- 输入处理 ---
            function getCanvasPos(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = W / rect.width;
                const scaleY = H / rect.height;
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY,
                };
            }

            function getTouchPos(e) {
                if (e.touches.length === 0) return null;
                const rect = canvas.getBoundingClientRect();
                const scaleX = W / rect.width;
                const scaleY = H / rect.height;
                return {
                    x: (e.touches[0].clientX - rect.left) * scaleX,
                    y: (e.touches[0].clientY - rect.top) * scaleY,
                };
            }

            canvas.addEventListener('mousemove', (e) => {
                const pos = getCanvasPos(e);
                mouseX = pos.x;
                mouseInCanvas = true;
                if (pos.x >= CONTAINER_LEFT && pos.x <= CONTAINER_RIGHT &&
                    pos.y >= CONTAINER_TOP - 20 && pos.y <= CONTAINER_BOTTOM) {
                    canvas.style.cursor = 'pointer';
                } else if (gameOver && pos.y > H / 2 + 50 && pos.y < H / 2 + 120 &&
                    pos.x > W / 2 - 90 && pos.x < W / 2 + 90) {
                    canvas.style.cursor = 'pointer';
                } else {
                    canvas.style.cursor = 'default';
                }
            });

            canvas.addEventListener('mouseleave', () => {
                mouseInCanvas = false;
                canvas.style.cursor = 'default';
            });

            canvas.addEventListener('mouseenter', (e) => {
                mouseInCanvas = true;
                const pos = getCanvasPos(e);
                mouseX = pos.x;
            });

            canvas.addEventListener('click', (e) => {
                const pos = getCanvasPos(e);

                if (gameOver) {
                    const btnX = W / 2 - 90;
                    const btnY = H / 2 + 60;
                    if (pos.x > btnX && pos.x < btnX + 180 && pos.y > btnY && pos.y < btnY + 50) {
                        resetGame();
                    }
                    return;
                }

                if (pos.x >= CONTAINER_LEFT && pos.x <= CONTAINER_RIGHT &&
                    pos.y >= CONTAINER_TOP - 30 && pos.y <= CONTAINER_BOTTOM) {
                    mouseX = pos.x;
                    releaseFruit();
                }
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const pos = getTouchPos(e);
                if (pos) {
                    mouseX = pos.x;
                    mouseInCanvas = true;
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (gameOver) {
                    const pos = getCanvasPos(e);
                    if (pos) {
                        const btnX = W / 2 - 90;
                        const btnY = H / 2 + 60;
                        if (pos.x > btnX && pos.x < btnX + 180 && pos.y > btnY && pos.y < btnY + 50) {
                            resetGame();
                        }
                    }
                    return;
                }
                if (mouseInCanvas && currentFruitLevel !== null) {
                    releaseFruit();
                }
            });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const pos = getTouchPos(e);
                if (pos) {
                    mouseX = pos.x;
                    mouseInCanvas = true;
                }
                if (gameOver && pos) {
                    const btnX = W / 2 - 90;
                    const btnY = H / 2 + 60;
                    if (pos.x > btnX && pos.x < btnX + 180 && pos.y > btnY && pos.y < btnY + 50) {
                        resetGame();
                        return;
                    }
                }
                if (!gameOver && pos && pos.x >= CONTAINER_LEFT && pos.x <= CONTAINER_RIGHT &&
                    pos.y >= CONTAINER_TOP - 30 && pos.y <= CONTAINER_BOTTOM) {
                    releaseFruit();
                }
            }, { passive: false });

            // --- 响应式缩放 ---
            function resizeCanvas() {
                const maxWidth = Math.min(window.innerWidth * 0.95, 420);
                const maxHeight = Math.min(window.innerHeight * 0.92, 750);
                const scale = Math.min(maxWidth / W, maxHeight / H);
                canvas.style.width = (W * scale) + 'px';
                canvas.style.height = (H * scale) + 'px';
            }

            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // --- 启动游戏 ---
            resetGame();
            requestAnimationFrame(gameLoop);

            console.log('🍉 合成大西瓜 - 已添加0.5秒释放冷却');
        })();
    </script>
</body>
</html>
